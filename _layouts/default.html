<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta http-equiv="Content-language" content="en" />
<meta name="language" content="en" />
<!-- The layout is a fixed 990px width; this lets mobile browsers show it scaled rather than clipped. -->
<meta name="viewport" content="width=990" />
<meta name="author" content="{{ site.author }}" />
<meta name="copyright" content="{{ site.author }}" />

<meta name="description" content="{{ page.description | default: site.description }}" />
<meta name="robots" content="index,follow" />
<meta name="keywords" content="{{ site.keywords }}" />

<title>{% if page.title %}{{ page.title }} - {% endif %}OpenLieroX</title>
{% if page.rss %}<link href="{{ '/feed.xml' | relative_url }}" type="application/rss+xml" rel="alternate" title="RSS news" />{% endif %}

<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32x32.png' | relative_url }}" />
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon-16x16.png' | relative_url }}" />
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}" />

<link rel="stylesheet" type="text/css" href="{{ '/official/default/main.css' | relative_url }}" media="screen" />
<link rel="stylesheet" type="text/css" href="{{ '/official/default/main_print.css' | relative_url }}" media="print" />
</head>

<body>

	<div class="ie_center">
	<div class="layout_wrapper">

      <h1 class="print_logo">OpenLieroX</h1>

    <div class="logo_wrapper">

      <div class="main_logo">
      <img src="{{ '/official/default/images/logo.png' | relative_url }}" alt="OpenLieroX Logo" class="main_logo_img" />
      </div>

	    <!-- Menu -->
	    <ul class="menu" id="main_menu">
	      <li class="menu_item" id="menu_0" onclick="location.href='{{ '/' | relative_url }}';"><a href="{{ '/' | relative_url }}" class="menu_link">Main</a></li>
      <li class="menu_item" id="menu_1" onclick="location.href='{{ '/news/' | relative_url }}';"><a href="{{ '/news/' | relative_url }}" class="menu_link">News</a></li>
      <li class="menu_item" id="menu_2" onclick="location.href='{{ '/downloads/' | relative_url }}';"><a href="{{ '/downloads/' | relative_url }}" class="menu_link">Downloads</a></li>
      <li class="menu_item" id="menu_3" onclick="location.href='{{ '/screenshots/' | relative_url }}';"><a href="{{ '/screenshots/' | relative_url }}" class="menu_link">Screenshots</a></li>
      <li class="menu_item" id="menu_4" onclick="location.href='{{ '/help/' | relative_url }}';"><a href="{{ '/help/' | relative_url }}" class="menu_link">Help</a></li>
      <li class="menu_item" id="menu_5" onclick="location.href='{{ '/wiki/' | relative_url }}';"><a href="{{ '/wiki/' | relative_url }}" class="menu_link">Wiki</a></li>
      <li class="menu_item" id="menu_6" onclick="location.href='{{ '/forum/' | relative_url }}';"><a href="{{ '/forum/' | relative_url }}" class="menu_link">Forum</a></li>
	    </ul>

    </div>

    <div class="main_content">
{{ content }}
    </div>

    <div class="footer">
    <ul class="footer_links">
      <li class="footer_link_li">Site design &amp; implementation Dark Charlie. Graphics by Raziel &amp; miri.</li>
    </ul>
    </div>
  </div>
  </div>
</body>
</html>
