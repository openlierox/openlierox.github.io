<!--
  Fill the latest-master version number in from the rolling GitHub release, and
  keep the whole download section hidden until that lookup settles so the primary
  link never flashes without its version number.
-->
<script>
  (function () {
    var section = document.getElementById('download_section');
    var el = document.getElementById('latest_version');
    function reveal() { if (section) section.style.display = ''; }
    if (!el || !window.fetch) { reveal(); return; }
    fetch('https://api.github.com/repos/openlierox/openlierox/releases/latest', {
      headers: { 'Accept': 'application/vnd.github+json' }
    })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) {
        if (!data) return;
        // Release name looks like "OpenLieroX 20260619.1+git.22970ef"; pull out
        // just the version token, falling back to the tag name, then the name.
        var label = data.name || data.tag_name;
        if (!label) return;
        var m = label.match(/\d{6,}(?:\.\d+)?/);
        el.textContent = m ? m[0] : label;
      })
      .catch(function () { /* keep the static fallback on any error */ })
      .then(reveal);
  })();
</script>
