<noscript><style>#download_section{display:block !important}</style></noscript>

<!--
  Fill the version numbers in from GitHub: the "Latest Release" link tracks the
  newest stable release (releases/latest, which skips pre-releases), and the
  "Latest development build" link tracks the newest published release overall
  (first non-draft entry in the list, newest-first). Keep the whole download
  section hidden until both lookups settle so the links never flash without
  their version numbers.
-->
<script>
  (function () {
    var section = document.getElementById('download_section');
    function reveal() { if (section) section.style.display = ''; }
    if (!window.fetch) { reveal(); return; }

    // Release name looks like "OpenLieroX 20260619.1+git.22970ef"; pull out just
    // the version token, falling back to the tag name, then the whole name.
    function versionOf(data) {
      var label = data && (data.name || data.tag_name);
      if (!label) return null;
      var m = label.match(/\d{6,}(?:\.\d+)?/);
      return m ? m[0] : label;
    }

    var opts = { headers: { 'Accept': 'application/vnd.github+json' } };

    // Latest stable release.
    var stable = fetch('https://api.github.com/repos/openlierox/openlierox/releases/latest', opts)
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) {
        var el = document.getElementById('latest_release');
        var v = versionOf(data);
        if (el && v) el.textContent = v;
      })
      .catch(function () { /* keep the static fallback on any error */ });

    // Latest development build: the newest published release, regardless of
    // whether it is flagged as a pre-release. GitHub returns the list
    // newest-first, so this is the first non-draft entry.
    var pre = fetch('https://api.github.com/repos/openlierox/openlierox/releases?per_page=30', opts)
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (list) {
        if (!list || !list.length) return;
        var rel = null;
        for (var i = 0; i < list.length; i++) {
          if (!list[i].draft) { rel = list[i]; break; }
        }
        if (!rel) return;
        var el = document.getElementById('latest_master');
        var link = document.getElementById('main_download_link_master');
        var v = versionOf(rel);
        if (el && v) el.textContent = v;
        if (link && rel.html_url) link.href = rel.html_url;
      })
      .catch(function () { /* keep the static fallback on any error */ });

    Promise.all([stable, pre]).then(reveal, reveal);
  })();
</script>
